name: Deploy MoveCar SaaS Web

on:
  push:
    branches:
      - main
    paths:
      - 'saas-web/**'
      - '.github/workflows/deploy-saas-web.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'saas-web/**'
      - '.github/workflows/deploy-saas-web.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('saas-web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Generate Drizzle client
        run: npm run db:generate

      - name: Type check
        run: node node_modules/typescript/bin/tsc --noEmit

  deploy-production:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: saas-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('saas-web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: npx --yes vercel@50.33.1 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx --yes vercel@50.33.1 build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: npx --yes vercel@50.33.1 deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
